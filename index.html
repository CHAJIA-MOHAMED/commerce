<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>ParaPharma Santé+</title>
    <link rel="stylesheet" href="style.css">
    <!-- Icons (Font Awesome) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <!-- Navbar -->
    <header>
        <div class="logo">
            <i class="fa-solid fa-heart-pulse"></i> ParaPharma Santé+
        </div>
        <nav>
            <a href="#">Accueil</a>
            <a href="#">Produits</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <h1>Votre santé, notre priorité</h1>
        <p>Produits certifiés et de qualité</p>
        <button>Voir les produits</button>
    </section>

    <!-- Produits -->
    <section class="products">
        <h2>Nos Produits</h2>

        <div class="product-container">

            <div class="card">
                <img src="1image.webp" alt="Crème">
                <h3><i class="fa-solid fa-pump-soap"></i> Crème Hydratante</h3>
                <p>120 MAD</p>
                <button>commander via whatsapp</button>
            </div>

            <div class="card">
                <img src="2image.jpg" alt="Vitamine">
                <h3><i class="fa-solid fa-capsules"></i> Vitamine C</h3>
                <p>80 MAD</p>
                <button>commander via whatsapp</button>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1587854692152-cbe660dbde88" alt="Thermomètre">
                <h3><i class="fa-solid fa-thermometer"></i> Thermomètre Digital</h3>
                <p>150 MAD</p>
                <button>commander via whatsapp</button>
            </div>

        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 ParaPharma Santé+ | Tous droits réservés</p>
    </footer>

</body>
</html>
