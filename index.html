<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">MyShop</div>
        <nav>
            <a href="#">Accueil</a>
            <a href="#">Produits</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <h1>Bienvenue dans notre boutique</h1>
        <p>Découvrez nos meilleurs produits</p>
        <button>Acheter Maintenant</button>
    </section>

    <!-- Products -->
    <section class="products">
        <h2>Nos Produits</h2>

        <div class="product-container">

            <div class="card">
                <img src="https://via.placeholder.com/200" alt="Produit 1">
                <h3>Produit 1</h3>
                <p>100 MAD</p>
                <button>Ajouter au panier</button>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/200" alt="Produit 2">
                <h3>Produit 2</h3>
                <p>150 MAD</p>
                <button>Ajouter au panier</button>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/200" alt="Produit 3">
                <h3>Produit 3</h3>
                <p>200 MAD</p>
                <button>Ajouter au panier</button>
            </div>

        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 MyShop - Tous droits réservés</p>
    </footer>

</body>
</html>
